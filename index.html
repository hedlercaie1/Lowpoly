<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lowpoly Site</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* CSS extra apenas para forçar o YouTube a ficar no fundo cobrindo a tela toda */
        .yt-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; overflow: hidden; pointer-events: none;
        }
        #ytplayer {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="yt-container">
        <div id="ytplayer"></div>
    </div>

    <div class="overlay"></div>

    <div class="content">
        <h1>$LOWPOLY</h1>
        <p>Where life is simpler</p>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytplayer', {
                videoId: 'jsd2VSZVTF8', /* O ID do vídeo que você escolheu */
                playerVars: {
                    'autoplay': 1, 'controls': 0, 'disablekb': 1,
                    'loop': 1, 'playlist': 'jsd2VSZVTF8', /* Repete o ID para o loop funcionar */
                    'modestbranding': 1, 'playsinline': 1,
                    'rel': 0, 'showinfo': 0, 'mute': 1 /* Inicia mudo para garantir o autoplay */
                },
                events: {
                    'onReady': function(event) { event.target.playVideo(); }
                }
            });
        }
    </script>
</body>
</html>
