<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background YT & Ticker Lowpoly</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Container do YouTube para cobrir toda a tela */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            pointer-events: none; /* Impede que o usuário clique e pause o vídeo acidentalmente */
        }

        /* Hack CSS para manter o iframe do YT sempre cobrindo a tela inteira (aspect ratio 16:9) */
        #ytplayer {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Camada de Escurecimento e Ruído (Grain) */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: rgba(0, 0, 0, 0.6);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.4'/%3E%3C/svg%3E");
            pointer-events: none; 
        }

        /* Container do Ticker */
        .ticker-wrap {
            position: absolute;
            bottom: 50px;
            width: 100%;
            overflow: hidden;
            background-color: transparent;
            padding: 12px 0;
            box-sizing: content-box;
            font-family: 'Press Start 2P', cursive;
            font-size: 32px;
            white-space: nowrap;
        }

        .ticker-move {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 20s linear infinite;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #0ff,
                0 0 40px #0ff,
                0 0 80px #0ff;
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* Botão de Som Estilo Lowpoly/Retro */
        .sound-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: 2px solid #0ff;
            padding: 15px 20px;
            cursor: pointer;
            text-shadow: 0 0 5px #0ff;
            box-shadow: 0 0 10px #0ff inset, 0 0 10px #0ff;
            transition: all 0.2s ease-in-out;
        }

        .sound-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <button id="soundToggle" class="sound-btn">LIGAR SOM [ ]</button>

    <div class="video-background">
        <div id="ytplayer"></div>
    </div>

    <div class="video-overlay"></div>

    <div class="ticker-wrap">
        <div class="ticker-move">
            $LOWPOLY // BEM-VINDO AO PROJETO // CONSTRUINDO O FUTURO // $LOWPOLY
        </div>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytplayer', {
                videoId: 'jsd2VSZVTF8', // ID do vídeo de DNB & Jungle Mix
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'disablekb': 1,
                    'loop': 1,
                    'playlist': 'jsd2VSZVTF8', // Repete o ID para o loop funcionar corretamente
                    'modestbranding': 1,
                    'playsinline': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'mute': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        const soundBtn = document.getElementById('soundToggle');
        let isMuted = true;

        soundBtn.addEventListener('click', () => {
            if (isMuted) {
                player.unMute();
                player.setVolume(100); 
                isMuted = false;
                soundBtn.innerText = 'DESLIGAR SOM [X]';
                soundBtn.style.borderColor = '#f0f'; 
                soundBtn.style.color = '#f0f';
                soundBtn.style.textShadow = '0 0 5px #f0f';
                soundBtn.style.boxShadow = '0 0 10px #f0f inset, 0 0 10px #f0f';
            } else {
                player.mute();
                isMuted = true;
                soundBtn.innerText = 'LIGAR SOM [ ]';
                soundBtn.style.borderColor = '#0ff'; 
                soundBtn.style.color = '#fff';
                soundBtn.style.textShadow = '0 0 5px #0ff';
                soundBtn.style.boxShadow = '0 0 10px #0ff inset, 0 0 10px #0ff';
            }
        });
    </script>
</body>
</html>
