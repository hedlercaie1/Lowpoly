<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lowpoly Site</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://www.youtube.com">
    
    <style>
        /* Fundo preto para disfarçar o tempo de carregamento do YouTube */
        body, html {
            background-color: #000 !important; 
        }

        .yt-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; 
            overflow: hidden; pointer-events: none;
        }
        #ytplayer {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Overlay com Opacidade e Grain (Manti o important aqui porque isso é crucial para a estrutura do fundo) */
        .overlay {
            z-index: 1 !important;
            background-color: rgba(0, 0, 0, 0.6) !important; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E") !important;
            background-repeat: repeat !important;
            background-size: 200px 200px !important;
        }

        /* Usando o ID #main-content para aumentar a especificidade e evitar !important */
        #main-content {
            z-index: 2;
            position: relative; /* Garante que fique acima da overlay */
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Ocupa a tela toda para centralizar de verdade */
        }

        /* TÍTULO PRINCIPAL ($LOWPOLY) */
        #main-content h1 {
            color: #fff;
            font-size: 5rem;
            margin: 0 0 5px 0; 
            letter-spacing: 2px;
            /* Brilho neon aplicado diretamente, sem !important */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 15px rgba(255, 255, 255, 0.5); 
        }

        /* SUBTÍTULO ESTILIZADO (Where life is simpler) */
        #main-content p {
            color: rgba(255, 255, 255, 0.85); 
            font-size: 1.1rem; 
            font-family: 'Courier New', Courier, monospace; 
            text-transform: uppercase; 
            letter-spacing: 8px; 
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3); 
            margin: 10px 0 0 0;
        }

        /* CAIXA DO CONTRACT ADDRESS (CA) */
        .ca-box {
            margin-top: 40px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease-in-out;
            pointer-events: auto; 
        }

        .ca-box:hover {
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
        }

        .ca-label {
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .ca-address {
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* Botão em inglês */
        .unmute-hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5); 
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 3;
            cursor: pointer;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        
        .unmute-hint:hover {
            color: rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body>

    <div class="yt-container">
        <div id="ytplayer"></div>
    </div>

    <div class="overlay"></div>

    <div id="main-content" class="content">
        <h1>$LOWPOLY</h1>
        <p>Where life is simpler</p>
        
        <div class="ca-box" onclick="copyCA()">
            <span class="ca-label">CA:</span>
            <span class="ca-address" id="caText">Soon</span>
        </div>
    </div>

    <div class="unmute-hint" id="unmuteBtn">[ Click anywhere to unmute ]</div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytplayer', {
                videoId: 'jsd2VSZVTF8',
                playerVars: {
                    'autoplay': 1, 'controls': 0, 'disablekb': 1,
                    'loop': 1, 'playlist': 'jsd2VSZVTF8',
                    'modestbranding': 1, 'playsinline': 1,
                    'rel': 0, 'showinfo': 0, 
                    'mute': 1
                },
                events: {
                    'onReady': function(event) { 
                        event.target.playVideo(); 
                    }
                }
            });
        }

        document.body.addEventListener('click', function(e) {
            if (!e.target.closest('.ca-box') && player && player.isMuted()) {
                player.unMute();
                player.setVolume(100);
                document.getElementById('unmuteBtn').style.display = 'none';
            }
        });

        function copyCA() {
            const caElement = document.getElementById('caText');
            const caString = caElement.innerText;
            
            if(caString === "COPIED!") return; 

            navigator.clipboard.writeText(caString).then(() => {
                caElement.innerText = "COPIED!";
                caElement.style.color = "#0ff"; 
                
                setTimeout(() => {
                    caElement.innerText = caString;
                    caElement.style.color = "#fff";
                }, 2000);
            });
        }
    </script>
</body>
</html>
