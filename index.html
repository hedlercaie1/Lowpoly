<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lowpoly Site</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* CSS extra para o YouTube e as melhorias visuais */
        body, html {
            background-color: transparent !important; 
        }

        .yt-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; 
            overflow: hidden; pointer-events: none;
        }
        #ytplayer {
            width: 100vw; height: 56.25vw;
            min-height: 100vh; min-width: 177.77vh;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Camada 1: O Overlay com 50% de Opacidade e Grain */
        .overlay {
            z-index: 1 !important;
            /* PRETO COM 50% DE OPACIDADE */
            background-color: rgba(0, 0, 0, 0.7) !important; 
            /* Gera o efeito de estática/grain usando um SVG inline */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.2'/%3E%3C/svg%3E") !important;
            background-repeat: repeat !important;
            background-size: 200px 200px !important;
        }

        /* Camada 2: O Texto com Brilho (Glow) */
        .content {
            z-index: 2 !important;
            pointer-events: none;
        }

        /* Aumentando o brilho dos textos centralizados */
        .content h1, .content p {
            color: #fff !important; /* Garante que seja branco */
            /* Efeito de neon/glow branco */
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #fff;
        }

        /* Mantendo os tamanhos do seu style.css, mas garantindo que estejam aqui */
        .content h1 {
            font-size: 5rem;
            margin-bottom: 10px;
        }

        .content p {
            font-size: 1.5rem;
        }

        .unmute-hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5); 
            font-family: Arial, sans-serif;
            font-size: 14px;
            z-index: 3;
            cursor: pointer;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="yt-container">
        <div id="ytplayer"></div>
    </div>

    <div class="overlay"></div>

    <div class="content">
        <h1>$LOWPOLY</h1>
        <p>Where life is simpler</p>
    </div>

    <div class="unmute-hint" id="unmuteBtn">[ Clique em qualquer lugar da tela para ativar o som ]</div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytplayer', {
                videoId: 'jsd2VSZVTF8',
                playerVars: {
                    'autoplay': 1, 'controls': 0, 'disablekb': 1,
                    'loop': 1, 'playlist': 'jsd2VSZVTF8',
                    'modestbranding': 1, 'playsinline': 1,
                    'rel': 0, 'showinfo': 0, 
                    'mute': 1
                },
                events: {
                    'onReady': function(event) { 
                        event.target.playVideo(); 
                    }
                }
            });
        }

        document.body.addEventListener('click', function() {
            if(player && player.isMuted()) {
                player.unMute();
                player.setVolume(100);
                document.getElementById('unmuteBtn').style.display = 'none';
            }
        });
    </script>
</body>
</html>
